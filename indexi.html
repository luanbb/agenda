<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Contatos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Minha Agenda</h1>
        
        <input type="text" id="filtro" placeholder="Filtrar por nome..." onkeyup="listarContatos()">

        <form id="formContato">
            <input type="hidden" id="indexEdicao" value="">
            <input type="text" id="nome" placeholder="Nome" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="tel" id="telefone" placeholder="Telefone" required>
            <button type="submit" id="btnSalvar">Cadastrar</button>
        </form>

        <p>Total de contatos: <span id="totalContatos">0</span></p>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaCorpo"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
